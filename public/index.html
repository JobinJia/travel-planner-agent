<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>旅行规划助手</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700&family=IBM+Plex+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <h1 class="app-title">旅行规划助手</h1>
          <button id="new-thread-btn" type="button" class="btn-icon" title="新建对话">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="9" y1="3" x2="9" y2="15"/><line x1="3" y1="9" x2="15" y2="9"/></svg>
          </button>
        </div>
        <input id="thread-search" type="text" class="sidebar-search" placeholder="搜索线程..." />
        <div class="thread-filters">
          <button id="show-active" type="button" class="filter-btn active">活跃</button>
          <button id="show-archived" type="button" class="filter-btn">已归档</button>
        </div>
        <div id="thread-list" class="thread-list"></div>
      </aside>

      <div class="chat-column">
        <div class="chat-header" id="chat-header">
          <button id="sidebar-toggle" type="button" class="btn-icon mobile-only" title="打开侧栏">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="5" x2="17" y2="5"/><line x1="3" y1="10" x2="17" y2="10"/><line x1="3" y1="15" x2="17" y2="15"/></svg>
          </button>
          <span id="chat-title" class="chat-title">新对话</span>
          <button id="refresh-live-btn" type="button" class="header-action-btn hidden" title="刷新实时信息">刷新实时信息</button>
        </div>

        <div id="welcome-screen" class="welcome-screen">
          <div class="welcome-content">
            <div class="welcome-icon">
              <svg width="48" height="48" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M24 4L28 14L38 16L30 24L32 34L24 30L16 34L18 24L10 16L20 14Z"/>
                <circle cx="24" cy="24" r="22"/>
              </svg>
            </div>
            <h2>开始规划你的旅程</h2>
            <p>输入目的地、时间、预算等需求，AI 会为你生成候选方案并评估路线</p>
            <div class="welcome-hints">
              <span>多轮对话</span>
              <span>路线评估</span>
              <span>结构化日程</span>
              <span>附近推荐</span>
            </div>
          </div>
        </div>

        <div id="message-area" class="message-area hidden">
          <div id="message-list" class="message-list"></div>
        </div>

        <div class="input-bar">
          <div id="status-bar" class="status-bar hidden"></div>
          <form id="planner-form" class="input-form">
            <input id="thread-id" type="hidden" value="" />
            <div class="input-wrapper">
              <textarea id="message" rows="1" placeholder="描述你的旅行需求..." required></textarea>
              <button id="submit-button" type="submit" class="send-btn" title="发送">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="9" y1="15" x2="9" y2="3"/><polyline points="3,8 9,3 15,8"/></svg>
              </button>
            </div>
          </form>
        </div>
      </div>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
