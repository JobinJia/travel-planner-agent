services:
  postgres:
    image: postgres:16-alpine
    container_name: travel-planner-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: travel_planner
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d travel_planner"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: travel-planner-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PORT: 3000
      POSTGRES_URL: postgresql://postgres:postgres@postgres:5432/travel_planner?sslmode=disable
      POSTGRES_SCHEMA: public
    ports:
      - "3000:3000"

volumes:
  postgres-data:
